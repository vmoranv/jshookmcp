# Lefthook — pre-push CI gate
# Runs fast checks locally; test + build are left to CI to keep push snappy (~30s).

pre-push:
  piped: true
  commands:
    docs-format:
      run: pnpm run check:docs-format
    markdownlint:
      run: pnpm run lint:md
    lint:
      run: pnpm run lint
    typecheck:
      run: pnpm run typecheck
    audit-tools:
      run: pnpm run audit:tools
