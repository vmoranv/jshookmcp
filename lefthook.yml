# Lefthook — local CI gates
# pre-commit: auto-fix docs formatting so it never blocks push/CI
# pre-push:   parallel checks — all run regardless of individual failures,
#             so you see every issue in one shot instead of one-at-a-time.

pre-commit:
  commands:
    docs-autoformat:
      glob: "docs/**/*.{ts,md,json} .github/**/*.{yml,md} *.md"
      run: prettier {staged_files} --write
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    docs-format:
      run: pnpm run check:docs-format
    markdownlint:
      run: pnpm run lint:md
    lint:
      run: pnpm run lint
    typecheck:
      run: pnpm run typecheck
    audit-tools:
      run: pnpm run audit:tools
