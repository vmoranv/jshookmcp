# Lefthook — pre-push CI gate
# Mirrors the checks in .github/workflows/ci.yml so broken code never reaches remote.
# All commands run sequentially (piped: true) and the push is blocked on any failure.

pre-push:
  piped: true
  commands:
    docs-format:
      run: pnpm run check:docs-format
    lint:
      run: pnpm run lint
    typecheck:
      run: pnpm run typecheck
    test:
      run: pnpm run test
    build:
      run: pnpm run build
    audit-tools:
      run: pnpm run audit:tools
