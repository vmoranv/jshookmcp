# Lefthook — local CI gates
# pre-commit: auto-format with oxfmt + fast oxlint on staged files
# pre-push:   parallel checks — all run regardless of individual failures,
#             so you see every issue in one shot instead of one-at-a-time.

pre-commit:
  commands:
    block-planning:
      glob: ".planning/**"
      run: "echo '❌ .planning/ files must not be committed' && exit 1"
    oxfmt:
      glob: "*.{ts,tsx,js,mjs,json}"
      run: npx oxfmt {staged_files} --write
      stage_fixed: true
    oxlint:
      glob: "*.{ts,tsx,js,mjs}"
      run: npx oxlint {staged_files}
    coverage-gate:
      glob: "*.{ts,tsx}"
      run: pnpm run test:coverage

pre-push:
  commands:
    refresh-git-noise:
      run: pnpm run git:refresh-noise
    oxlint:
      run: pnpm run lint
    oxfmt-check:
      run: pnpm run format:check
    markdownlint:
      run: pnpm run lint:md
    typecheck:
      run: pnpm run typecheck
    audit-tools:
      run: pnpm run audit:tools
