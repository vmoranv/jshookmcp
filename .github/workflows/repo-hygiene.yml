name: Repo Hygiene

on:
  pull_request:
    paths:
      - '.github/**'
      - 'docs/**'
      - 'README.md'
      - 'README.zh.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.lychee.toml'
      - 'renovate.json'
  push:
    branches: [main, master]
    paths:
      - '.github/**'
      - 'docs/**'
      - 'README.md'
      - 'README.zh.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.lychee.toml'
      - 'renovate.json'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          config: '.markdownlint-cli2.jsonc'
          globs: |
            README.md
            README.zh.md
            CONTRIBUTING.md
            docs/**/*.md
            .github/**/*.md

  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.11

  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project and docs for link checking
        run: |
          pnpm run build
          pnpm run docs:build

      - name: Add local preview hostname
        run: echo '127.0.0.1 docs-preview.local' | sudo tee -a /etc/hosts

      - name: Start VitePress preview server
        run: |
          nohup pnpm run docs:preview > /tmp/vitepress-preview.log 2>&1 &

          for attempt in $(seq 1 30); do
            if curl -fsS http://docs-preview.local:4173/ > /dev/null; then
              exit 0
            fi
            echo "Waiting for preview server (${attempt}/30)"
            sleep 2
          done

          cat /tmp/vitepress-preview.log
          exit 1

      - name: Check repository markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config ./.lychee.toml README.md README.zh.md CONTRIBUTING.md .github
          fail: true
          format: markdown
          output: lychee/repo-links.md

      - name: Check docs links against preview site
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config ./.lychee.toml --base-url http://docs-preview.local:4173 docs
          fail: true
          format: markdown
          output: lychee/docs-links.md
