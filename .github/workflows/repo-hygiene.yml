name: Repo Hygiene

on:
  pull_request:
    paths:
      - '.github/**'
      - 'docs/**'
      - 'README.md'
      - 'README.zh.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.lychee.toml'
      - 'renovate.json'
  push:
    branches: [main, master]
    paths:
      - '.github/**'
      - 'docs/**'
      - 'README.md'
      - 'README.zh.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.lychee.toml'
      - 'renovate.json'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          config: '.markdownlint-cli2.jsonc'
          globs: |
            README.md
            README.zh.md
            CONTRIBUTING.md
            docs/**/*.md
            .github/**/*.md

  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.11

  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project and VitePress site for link checking
        run: |
          pnpm run build
          pnpm run docs:build

      - name: Check links against built site output
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config ./.lychee.toml --root-dir ./docs/.vitepress/dist README.md README.zh.md CONTRIBUTING.md .github docs/.vitepress/dist
          fail: true
          format: markdown
          output: lychee/out.md