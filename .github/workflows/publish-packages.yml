name: Publish Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@jshookmcp'

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm run check

      - name: Check root package publish status
        id: root_publish_status
        run: |
          ROOT_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if npm view "@jshookmcp/jshook@$ROOT_VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack and verify root package
        if: steps.root_publish_status.outputs.should_publish == 'true'
        run: pnpm run package:verify-release

      - name: Publish root package
        if: steps.root_publish_status.outputs.should_publish == 'true'
        run: |
          ROOT_TARBALL="$(find .release-artifacts -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$ROOT_TARBALL"
          pnpm publish "$ROOT_TARBALL" --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-extension-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@jshookmcp'

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify and build SDK
        run: |
          pnpm -C packages/extension-sdk typecheck
          pnpm -C packages/extension-sdk build

      - name: Check SDK package publish status
        id: sdk_publish_status
        run: |
          SDK_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/extension-sdk/package.json', 'utf8')).version")"
          if npm view "@jshookmcp/extension-sdk@$SDK_VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack SDK package
        if: steps.sdk_publish_status.outputs.should_publish == 'true'
        run: |
          rm -rf .release-artifacts-sdk
          mkdir -p .release-artifacts-sdk
          pnpm -C packages/extension-sdk pack --pack-destination ../../.release-artifacts-sdk

      - name: Publish extension SDK
        if: steps.sdk_publish_status.outputs.should_publish == 'true'
        run: |
          SDK_TARBALL="$(find .release-artifacts-sdk -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$SDK_TARBALL"
          pnpm publish "$SDK_TARBALL" --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
